name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release # repo レベルの排他制御
  cancel-in-progress: false # PR の更新があった場合は前のジョブをキャンセルしない

permissions:
  id-token: write
  contents: write # Release ページの書き込みに必要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.1'
          extensions: pdo, sqlite3

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create release archive
        run: |
          # 不要なファイルを除外してアーカイブ作成
          zip -r phpUploader-${GITHUB_REF#refs/tags/}.zip . \
            -x "*.git*" \
            -x ".config/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "image/*" \
            -x "scripts/*" \
            -x "tests/*" \
            -x ".gitignore" \
            -x ".markdownlint.json" \
            -x "aqua.yaml" \
            -x "aqua-checksums.json" \
            -x "cspell.json" \
            -x "github-comment.yaml" \
            -x "phpcs.xml" \
            -x "phpunit.xml" \
            -x "phpstan.neon" \
            -x "renovate.json" \
            -x "*.md" \

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: phpUploader-*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
