name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release # repo レベルの排他制御
  cancel-in-progress: false # PR の更新があった場合は前のジョブをキャンセルしない

permissions:
  id-token: write
  contents: write # Release ページの書き込みに必要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.1'
          extensions: pdo, sqlite3

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create release archive
        run: |
          # 不要なファイルを除外してアーカイブ作成
          zip -r phpUploader-${GITHUB_REF#refs/tags/}.zip . \
            -x "*.git*" \
            -x ".config/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "image/*" \
            -x "scripts/*" \
            -x "tests/*" \
            -x ".gitignore" \
            -x ".markdownlint.json" \
            -x "aqua.yaml" \
            -x "aqua-checksums.json" \
            -x "cspell.json" \
            -x "github-comment.yaml" \
            -x "phpcs.xml" \
            -x "phpunit.xml" \
            -x "phpstan.neon" \
            -x "renovate.json" \
            -x "*.md" \

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: phpUploader-*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
