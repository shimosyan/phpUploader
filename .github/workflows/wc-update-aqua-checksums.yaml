name: Update aqua-checksums.json

on:
  workflow_call:
    secrets:
      CLIENT_ID:
        required: true
      PRIVATE_KEY:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  path-filter:
    # Get changed files to filter jobs
    timeout-minutes: 10
    outputs:
      test-files: ${{steps.changes.outputs.test-files}}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            test-files:
              - aqua.yaml

  update-aqua-checksums:
    needs: path-filter
    if: needs.path-filter.outputs.test-files == 'true'

    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.61.0

      - name: Fix aqua-checksums.json
        run: aqua upc -prune

      - name: Check if aqua-checksums.json is changed
        id: diff
        run: |
          # git管理されていないファイルも含めて変更を検出
          if [ ! -f ./aqua-checksums.json ]; then
            # ファイルが存在しない場合は変更なしとみなす
            echo "changed=0" >> "$GITHUB_OUTPUT"
          elif ! git ls-files --error-unmatch ./aqua-checksums.json >/dev/null 2>&1; then
            # ファイルが存在するがgit管理されていない場合（新規作成）
            echo "changed=1" >> "$GITHUB_OUTPUT"
          elif git diff --exit-code ./aqua-checksums.json; then
            # 既存ファイルで変更なし
            echo "changed=0" >> "$GITHUB_OUTPUT"
          else
            # 既存ファイルで変更あり
            echo "changed=1" >> "$GITHUB_OUTPUT"
          fi

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Commit and push
        if: steps.diff.outputs.changed == '1'
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          commit_message: "update: aqua-checksums.json"
          files: aqua-checksums.json
